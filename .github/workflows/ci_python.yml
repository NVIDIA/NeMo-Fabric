name: Python

on:
  workflow_call:
    inputs:
      ref:
        description: 'The Git ref to check out; defaults to the triggering commit'
        required: false
        default: ''
        type: string
      ref_name:
        description: 'The effective ref name; defaults to the triggering ref name'
        required: false
        default: ''
        type: string
      ref_type:
        description: 'The effective ref type; defaults to the triggering ref type'
        required: false
        default: ''
        type: string
  pull_request:
  push:
    branches: [main]
    tags: ['*']

concurrency:
  group: ci-python-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.platform }})
    continue-on-error: ${{ startsWith(matrix.platform, 'windows') }}
    strategy:
      fail-fast: false
      matrix:
        platform: [linux-amd64, linux-arm64, macos-arm64, windows-amd64, windows-arm64]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: macos-arm64
            runner: macos-15
          - platform: windows-amd64
            runner: windows-2022
          - platform: windows-arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}

      # Rust is needed both to build the native extension (maturin backend) and
      # because the CLI-backed smokes shell out to `cargo run -p nemo-fabric-cli`.
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable
          cache: false

      - name: Install just
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: just@1.50.0

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8

      - name: Set up Windows ARM Python
        if: ${{ matrix.platform == 'windows-arm64' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: arm64

      - name: Select setup-python interpreter for uv
        if: ${{ matrix.platform == 'windows-arm64' }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import sys
          print(f"UV_PYTHON={sys.executable}")
          PY

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: fabric-rust-${{ runner.os }}-${{ runner.arch }}

      # PyYAML is not a project dependency, but test_hermes_config_mapping
      # imports it to read Hermes Agent config fixtures, so install it for the tests.
      - name: Build SDK with native extension
        run: |
          uv venv --python "${UV_PYTHON:-${{ matrix.python-version }}}" .venv
          uv sync --group test --no-group dev --extra claude --extra codex --extra deepagents ${{ matrix.python-version != '3.11' && '--extra harbor' || '' }} ${{ matrix.python-version != '3.14' && '--extra hermes' || '' }} --extra relay --extra runtime

      - name: Run pytest
        run: |
          set -euo pipefail
          just test-python

  build-wheels:
    name: Build wheels (${{ matrix.platform }})
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: macos-arm64
            runner: macos-15
          - platform: windows-amd64
            runner: windows-2022
          - platform: windows-arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable
          cache: false

      - name: Install just
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: just@1.50.0

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Windows ARM Python
        if: ${{ matrix.platform == 'windows-arm64' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          architecture: arm64

      - name: Select setup-python interpreter for uv
        if: ${{ matrix.platform == 'windows-arm64' }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import sys
          print(f"UV_PYTHON={sys.executable}")
          PY

      - name: Set version from tag
        if: ${{ (inputs.ref_type || github.ref_type) == 'tag' }}
        env:
          RELEASE_VERSION: ${{ inputs.ref_name || github.ref_name }}
        run: just set-version "$RELEASE_VERSION"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: fabric-python-wheels-${{ runner.os }}-${{ runner.arch }}

      - name: Build wheels
        run: just wheels

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-wheels-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error
