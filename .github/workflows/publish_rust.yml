name: Publish Rust crates

on:
  push:
    tags:
      - '*'
      - '!*-alpha*'

concurrency:
  group: publish-rust-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish-rust:
    name: Publish (crates.io)
    # Workflow runs only for tags that are not alpha releases, beta and RC tags are OK
    if: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-alpha') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment: crates.io
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable
          cache: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: 0.9.22
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install just
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: just@1.50.0

      - name: Set project release version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: just set-version "$RELEASE_VERSION"

      - name: Authenticate to crates.io with trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="$RELEASE_VERSION"
          packages=(
            nemo-fabric-core
            nemo-fabric-cli
          )

          for package in "${packages[@]}"; do
            if cargo info "${package}@${version}" --registry crates-io >/dev/null 2>&1; then
              echo "${package} ${version} already exists on crates.io; skipping"
              continue
            fi

            cargo publish --package "$package" --no-verify --allow-dirty
          done
