schema_version: fabric.profile/v1alpha1
name: mcp_github
description: Test MCP and telemetry file-profile merging.

mcp:
  servers:
    github:
      transport: streamable-http
      url: ${GITHUB_MCP_URL}
      exposure: fabric_managed

telemetry:
  providers:
    relay: {}

relay:
  output_dir: ./artifacts/mcp-github
  observability:
    atif:
      enabled: true
      output_directory: ./artifacts/mcp-github
      filename_template: "trajectory-{session_id}.atif.json"
    atof:
      enabled: true
      sinks:
        - type: file
          output_directory: ./artifacts/mcp-github
          filename: events.atof.jsonl
          mode: overwrite
