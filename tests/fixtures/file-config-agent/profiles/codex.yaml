schema_version: fabric.profile/v1alpha1
name: codex
description: Test Codex SDK file-profile resolution.

harness:
  adapter_id: nvidia.fabric.codex
  resolution: preinstalled
  settings:
    sandbox: workspace-write
    reasoning_effort: high

models:
  default:
    provider: openai
    model: openai/gpt-5.4
    api_key_env: null
    temperature: null

skills: null
mcp: null

runtime:
  input_schema: text
  output_schema: message
  artifacts: ./artifacts/codex

environment:
  provider: local
  workspace: ./repos/my-service
  artifacts: ./artifacts/codex

telemetry: null
