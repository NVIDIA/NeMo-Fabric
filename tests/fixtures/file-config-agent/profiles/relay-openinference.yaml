schema_version: fabric.profile/v1alpha1
name: relay_openinference
description: Test Relay OpenInference file-profile resolution.

telemetry:
  providers:
    relay: {}

relay:
  output_dir: ./artifacts/relay-openinference
  observability:
    atif:
      enabled: true
      output_directory: ./artifacts/relay-openinference
      filename_template: "trajectory-{session_id}.atif.json"
      agent_name: code-review-agent
      agent_version: fabric-poc
    atof:
      enabled: true
      output_directory: ./artifacts/relay-openinference
      filename: events.atof.jsonl
      mode: overwrite
    openinference:
      enabled: true
      transport: http_binary
      endpoint: http://localhost:6006/v1/traces
