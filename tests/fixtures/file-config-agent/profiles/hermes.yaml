schema_version: fabric.profile/v1alpha1
name: hermes
description: Test Hermes file-profile resolution.

harness:
  adapter_id: nvidia.fabric.hermes
  resolution: preinstalled
  settings:
    workspace: ./repos/my-service
    hermes_home: ./artifacts/hermes-home
    base_url: https://integrate.api.nvidia.com/v1
    max_iterations: 1
    max_tokens: 512
    temperature: 0.0
    reasoning_config:
      effort: none
    enabled_toolsets: []
    system_prompt: You are a concise smoke test assistant.

runtime:
  input_schema: chat
  output_schema: message
  artifacts: ./artifacts/hermes

environment:
  provider: local
  workspace: ./repos/my-service
  artifacts: ./artifacts/hermes

telemetry: null
