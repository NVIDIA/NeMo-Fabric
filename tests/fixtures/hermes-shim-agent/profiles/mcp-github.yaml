schema_version: fabric.profile/v1alpha1
name: mcp_github
description: Test MCP capability variation.

mcp:
  servers:
    github:
      transport: streamable-http
      url: ${GITHUB_MCP_URL}
      exposure: harness_native

telemetry:
  providers:
    relay: {}

relay:
  output_dir: ./artifacts/relay
