[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "nemo-fabric"
version = "0.1.0"
description = "Python SDK surface for NeMo Fabric"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
harbor = ["harbor>=0.13.2"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
nemo_fabric = ["py.typed", "_native.pyi"]
