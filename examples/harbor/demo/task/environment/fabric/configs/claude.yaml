schema_version: fabric.agent/v1alpha1

metadata:
  name: harbor-calculator-claude
  description: Claude code-repair example in a Harbor task environment.

harness:
  adapter_id: nvidia.fabric.claude
  resolution: preinstalled
  settings:
    permission_mode: bypassPermissions
    max_turns: 20
    timeout_seconds: 600
    env:
      # Harbor runs the agent as root inside an ephemeral task container.
      IS_SANDBOX: "1"

models:
  default:
    provider: anthropic
    model: claude-sonnet-4-5
    api_key_env: ANTHROPIC_API_KEY

runtime:
  input_schema: text
  output_schema: message
  artifacts: /logs/agent/fabric-artifacts/claude

environment:
  provider: local
  workspace: /app
  artifacts: /logs/agent/fabric-artifacts/claude

telemetry: null
