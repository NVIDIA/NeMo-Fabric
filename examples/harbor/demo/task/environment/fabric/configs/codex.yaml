schema_version: fabric.agent/v1alpha1

metadata:
  name: harbor-calculator-demo
  description: Codex SDK code-repair example in a Harbor task environment.

harness:
  adapter_id: nvidia.fabric.codex
  resolution: preinstalled
  settings:
    sandbox: danger-full-access
    reasoning_effort: high

models:
  default:
    provider: openai
    model: openai/gpt-5.4

runtime:
  input_schema: text
  output_schema: message
  artifacts: /logs/agent/fabric-artifacts/codex

environment:
  provider: local
  workspace: /app
  artifacts: /logs/agent/fabric-artifacts/codex

telemetry: null
