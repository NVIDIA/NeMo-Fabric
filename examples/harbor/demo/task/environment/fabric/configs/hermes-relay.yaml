schema_version: fabric.agent/v1alpha1

metadata:
  name: harbor-calculator-demo
  description: Hermes CLI and Relay example in a Harbor task environment.

harness:
  adapter_id: nvidia.fabric.hermes.cli
  resolution: preinstalled
  settings:
    cwd: /app
    hermes_home: /tmp/fabric-hermes
    base_url: https://integrate.api.nvidia.com/v1
    max_iterations: 4
    terminal_timeout: 120

models:
  default:
    provider: nvidia
    model: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0

runtime:
  input_schema: text
  output_schema: message
  artifacts: /logs/agent/fabric-artifacts/hermes-relay

environment:
  provider: local
  workspace: /app
  artifacts: /logs/agent/fabric-artifacts/hermes-relay

telemetry:
  providers:
    relay: {}

relay:
  output_dir: /logs/agent/fabric-artifacts/hermes-relay/relay
  observability:
    atif:
      enabled: true
      output_directory: /logs/agent/fabric-artifacts/hermes-relay/relay
      filename_template: trajectory-{session_id}.atif.json
      agent_name: harbor-calculator-demo
    atof:
      enabled: true
      output_directory: /logs/agent/fabric-artifacts/hermes-relay/relay
      filename: events.atof.jsonl
      mode: overwrite
    openinference:
      enabled: true
      transport: http_binary
      endpoint: http://host.docker.internal:6006/v1/traces
