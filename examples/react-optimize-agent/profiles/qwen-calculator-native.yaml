schema_version: fabric.profile/v1alpha1

metadata:
  name: qwen-calculator-native
  description: calculator-optimize parity with Qwen IGW + native tool calling.

models:
  default:
    max_tokens: 512

harness:
  settings:
    workflow:
      tool_names: [calculator, current_datetime]
      use_native_tool_calling: true
      max_tool_calls: 8
    tools:
      calculator:
        kind: function_group
        include: [add, subtract, multiply, divide, compare]
      current_datetime:
        kind: current_datetime
