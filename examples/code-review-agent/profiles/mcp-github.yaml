schema_version: fabric.profile/v1alpha1
name: mcp_github
description: Vary GitHub MCP exposure and enable Relay telemetry.

mcp:
  servers:
    github:
      transport: streamable-http
      url: ${GITHUB_MCP_URL}
      exposure: fabric_managed

telemetry:
  enabled: true
  mode: sdk
  output_dir: ./artifacts/mcp-github
  config:
    version: 1
    components:
      - kind: observability
        enabled: true
        config:
          version: 1
          atif:
            enabled: true
            output_directory: ./artifacts/mcp-github
            filename_template: "trajectory-{session_id}.atif.json"
          atof:
            enabled: true
            output_directory: ./artifacts/mcp-github
            filename: events.atof.jsonl
            mode: overwrite
