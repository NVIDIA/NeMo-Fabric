schema_version: fabric.profile/v1alpha1
name: hermes_cli
description: Run the Hermes CLI adapter through an installed Hermes command.

harness:
  adapter_id: nvidia.fabric.hermes.cli
  resolution: preinstalled
  settings:
    workspace: ./repos/my-service
    hermes_home: ./artifacts/hermes-cli/home
    base_url: https://integrate.api.nvidia.com/v1
    max_iterations: 1
    terminal_timeout: 60
    enabled_toolsets: []

runtime:
  input_schema: chat
  output_schema: message
  artifacts: ./artifacts/hermes-cli

environment:
  provider: local
  workspace: ./repos/my-service
  artifacts: ./artifacts/hermes-cli

telemetry:
  enabled: false
