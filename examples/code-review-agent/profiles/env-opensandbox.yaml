schema_version: fabric.profile/v1alpha1
name: env_opensandbox
description: Run the harness/tools against an OpenSandbox-backed workspace and emit ATIF.

environment:
  provider: opensandbox
  control_location: external_control
  workspace: /workspace
  artifacts: /workspace/artifacts
  metadata:
    server_url: http://127.0.0.1:8080
    image: nvcr.io/nvidia/nemo/fabric-hermes:latest

telemetry:
  enabled: true
  mode: sdk
  output_dir: ./artifacts/opensandbox
  config:
    version: 1
    components:
      - kind: observability
        enabled: true
        config:
          version: 1
          atif:
            enabled: true
            output_directory: ./artifacts/opensandbox
