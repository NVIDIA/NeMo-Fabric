schema_version: fabric.profile/v1alpha1
name: native_otel
description: Enable Native OpenTelemetry tracing.

telemetry:
  enabled: true
  provider: native
  mode: sdk
  config:
    version: 1
    components:
      - kind: observability
        enabled: true
        config:
          version: 1
          opentelemetry:
            enabled: true
            transport: http_binary
            endpoint: http://localhost:4318/v1/traces
            resource_attributes:
              deployment.environment: dev