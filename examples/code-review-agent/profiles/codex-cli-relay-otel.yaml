schema_version: fabric.profile/v1alpha1
name: codex_cli_relay_otel
description: Run Codex CLI with NeMo Relay OpenTelemetry tracing enabled.

harness:
  adapter_id: nvidia.fabric.codex.cli
  resolution: preinstalled
  settings:
    sandbox: workspace-write
    skip_git_repo_check: true
    config_overrides:
      model_reasoning_effort: high

models:
  default:
    provider: openai
    model: openai/gpt-5.4
    api_key_env: null
    temperature: null

skills: null
mcp: null

runtime:
  mode: oneshot
  transport: cli
  input_schema: text
  output_schema: message
  artifacts: ./artifacts/codex-cli-relay-otel

environment:
  provider: local
  workspace: ./repos/my-service
  artifacts: ./artifacts/codex-cli-relay-otel

telemetry:
  enabled: true
  mode: sdk
  output_dir: ./artifacts/codex-cli-relay-otel/relay
  config:
    version: 1
    components:
      - kind: observability
        enabled: true
        config:
          version: 1
          opentelemetry:
            enabled: true
            transport: http_binary
            endpoint: http://localhost:4318/v1/traces
            service_name: code-review-agent
            service_namespace: fabric
            service_version: fabric-poc
            instrumentation_scope: nemo-relay-otel
            timeout_millis: 3000
            resource_attributes:
              deployment.environment: dev
