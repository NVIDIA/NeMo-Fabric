# Push a raw SemVer tag, such as `0.1.0` or `0.1.0-alpha.20260515`,
# to run the publishing pipeline.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_TAG
    - when: never

stages:
  - collect
  - publish

variables:
  NEMO_FABRIC_CI_DEBIAN_VERSION: "trixie"
  NEMO_FABRIC_CI_JUST_VERSION: "1.50.0"
  NEMO_FABRIC_CI_PYTHON_VERSION: "3.12"
  NEMO_FABRIC_CI_RUST_VERSION: "1.93.0"
  NEMO_FABRIC_CI_UV_VERSION: "0.9.28"
  NEMO_FABRIC_CI_GITHUB_REPOSITORY: "NVIDIA/nemo-fabric"
  NEMO_FABRIC_CI_GITHUB_WORKFLOW_FILE: "nightly-alpha-tag.yml"
  NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS: "7200"
  NEMO_FABRIC_CI_GITHUB_RUN_POLL_SECONDS: "60"

collect:github-artifacts:
  stage: collect
  image:
    name: alpine:3.22
    pull_policy: if-not-present
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_TAG
    - when: never
  before_script:
    - apk add --no-cache findutils github-cli
  script:
    - |
      set -eu

      if [ -z "${NEMO_FABRIC_CI_GITHUB_TOKEN:-}" ]; then
        echo "Error: NEMO_FABRIC_CI_GITHUB_TOKEN is required to download GitHub Actions artifacts." >&2
        exit 1
      fi
      export GH_TOKEN="${NEMO_FABRIC_CI_GITHUB_TOKEN}"

      mkdir -p collected/wheels downloaded/wheels

      tag="${CI_COMMIT_TAG}"
      if [ -z "$tag" ]; then
        echo "Error: CI_COMMIT_TAG is required to collect GitHub Actions artifacts for publishing." >&2
        exit 1
      fi

      tag_ref="tags/${tag}"
      deadline="$(( $(date -u +%s) + NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS ))"

      echo "Waiting for tag ${tag} in ${NEMO_FABRIC_CI_GITHUB_REPOSITORY}"
      while ! gh api "repos/${NEMO_FABRIC_CI_GITHUB_REPOSITORY}/git/ref/${tag_ref}" >/dev/null 2>&1; do
        if [ "$(date -u +%s)" -ge "$deadline" ]; then
          echo "Error: tag ${tag} did not appear within ${NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS} seconds." >&2
          exit 1
        fi
        sleep "$NEMO_FABRIC_CI_GITHUB_RUN_POLL_SECONDS"
      done

      tag_sha="$(
        gh api \
          "repos/${NEMO_FABRIC_CI_GITHUB_REPOSITORY}/commits/${tag}" \
          --jq '.sha'
      )"

      echo "Waiting for ${NEMO_FABRIC_CI_GITHUB_WORKFLOW_FILE} run for tag ${tag}"
      run_id=""
      while [ -z "$run_id" ]; do
        run_id="$(
          gh run list \
            --repo "$NEMO_FABRIC_CI_GITHUB_REPOSITORY" \
            --workflow "$NEMO_FABRIC_CI_GITHUB_WORKFLOW_FILE" \
            --commit "$tag_sha" \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // ""'
        )"
        if [ -n "$run_id" ]; then
          break
        fi
        if [ "$(date -u +%s)" -ge "$deadline" ]; then
          echo "Error: no GitHub Actions run found for tag ${tag} within ${NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS} seconds." >&2
          exit 1
        fi
        sleep "$NEMO_FABRIC_CI_GITHUB_RUN_POLL_SECONDS"
      done
      if [ -z "$run_id" ]; then
        echo "Error: no GitHub Actions run found for tag ${tag}." >&2
        exit 1
      fi

      run_html_url="$(
        gh run view "$run_id" \
          --repo "$NEMO_FABRIC_CI_GITHUB_REPOSITORY" \
          --json url \
          --jq '.url'
      )"
      echo "Watching GitHub Actions run ${run_id} for tag ${tag}: ${run_html_url}"
      if ! timeout "$NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS" \
        gh run watch "$run_id" \
          --repo "$NEMO_FABRIC_CI_GITHUB_REPOSITORY" \
          --interval "$NEMO_FABRIC_CI_GITHUB_RUN_POLL_SECONDS" \
          --exit-status; then
        echo "Error: GitHub Actions run ${run_id} for tag ${tag} failed, was cancelled, or did not complete within ${NEMO_FABRIC_CI_GITHUB_RUN_WAIT_SECONDS} seconds: ${run_html_url}" >&2
        exit 1
      fi

      gh run download "$run_id" \
        --repo "$NEMO_FABRIC_CI_GITHUB_REPOSITORY" \
        --pattern 'python-wheels-*' \
        --dir downloaded/wheels

      find downloaded/wheels -type f -name '*.whl' -exec cp {} collected/wheels/ \;
      if ! ls collected/wheels/*.whl >/dev/null 2>&1; then
        echo "Error: collected GitHub wheel artifacts did not contain any .whl files." >&2
        exit 1
      fi

      {
        printf '{\n'
        printf '  "run_id": "%s",\n' "$run_id"
        printf '  "run_url": "%s",\n' "$run_html_url"
        printf '  "workflow": "%s",\n' "$NEMO_FABRIC_CI_GITHUB_WORKFLOW_FILE"
        printf '  "tag": "%s"\n' "$tag"
        printf '}\n'
      } > collected/github-run.json
  artifacts:
    name: github-package-artifacts
    when: on_success
    expire_in: 7 days
    paths:
      - collected/wheels/*.whl
      - collected/github-run.json

publish:artifactory:wheels:
  stage: publish
  image:
    name: ghcr.io/astral-sh/uv:${NEMO_FABRIC_CI_UV_VERSION}-${NEMO_FABRIC_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_TAG
    - when: never
  needs:
    - job: collect:github-artifacts
      artifacts: true
  before_script:
    - uv sync --locked --no-install-project --no-default-groups --group dev
  script:
    - |
      set -eu

      if [ -z "${NEMO_FABRIC_CI_ARTIFACTORY_USER:-}" ] || [ -z "${NEMO_FABRIC_CI_ARTIFACTORY_KEY:-}" ] || [ -z "${NEMO_FABRIC_CI_ARTIFACTORY_PYPI_URL:-}" ]; then
        echo "Error: uploading wheels to Artifactory requires NEMO_FABRIC_CI_ARTIFACTORY_USER, NEMO_FABRIC_CI_ARTIFACTORY_KEY, and NEMO_FABRIC_CI_ARTIFACTORY_PYPI_URL." >&2
        exit 1
      fi
      if ! ls collected/wheels/*.whl >/dev/null 2>&1; then
        echo "Error: no collected wheel artifacts found." >&2
        exit 1
      fi

      uv run --no-sync python scripts/ci/artifactory_upload.py

publish:artifactory:cargo:
  stage: publish
  image:
    name: rust:${NEMO_FABRIC_CI_RUST_VERSION}-${NEMO_FABRIC_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_TAG
    - when: never
  needs:
    - job: collect:github-artifacts
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends ca-certificates curl git && rm -rf /var/lib/apt/lists/*
    - cargo install just --version "${NEMO_FABRIC_CI_JUST_VERSION}" --locked
    - curl -LsSf https://astral.sh/uv/install.sh -o /tmp/install-uv.sh
    - UV_VERSION="${NEMO_FABRIC_CI_UV_VERSION}" sh /tmp/install-uv.sh
    - export PATH="${HOME}/.cargo/bin:${HOME}/.local/bin:${PATH}"
    - uv python install "${NEMO_FABRIC_CI_PYTHON_VERSION}"
    - rustc --version
    - just --version
    - uv --version
  script:
    - |
      set -eu

      if [ -z "${NEMO_FABRIC_CI_ARTIFACTORY_KEY:-}" ] || [ -z "${NEMO_FABRIC_CI_ARTIFACTORY_CARGO_URL:-}" ]; then
        echo "Error: uploading Cargo crates to Artifactory requires NEMO_FABRIC_CI_ARTIFACTORY_KEY and NEMO_FABRIC_CI_ARTIFACTORY_CARGO_URL." >&2
        exit 1
      fi
      if [ ! -f collected/github-run.json ]; then
        echo "Error: no collected GitHub run metadata found." >&2
        exit 1
      fi

      version="$(
        uv run --no-project python - <<'PY'
      import json
      from pathlib import Path

      print(json.loads(Path("collected/github-run.json").read_text()).get("tag", ""))
      PY
      )"

      if [ -z "$version" ]; then
        echo "Error: failed to extract package version from collected GitHub tag metadata." >&2
        exit 1
      fi

      just set-version "$version"

      cargo_home="${CARGO_HOME:-${HOME}/.cargo}"
      mkdir -p "$cargo_home"

      cat > "${cargo_home}/config.toml" <<EOF
      [registry]
      global-credential-providers = ["cargo:token"]
      [registries]
      artifactory = { index = "sparse+${NEMO_FABRIC_CI_ARTIFACTORY_CARGO_URL}" }
      EOF
      export CARGO_REGISTRIES_ARTIFACTORY_TOKEN="Bearer ${NEMO_FABRIC_CI_ARTIFACTORY_KEY}"

      uv run --no-project python - <<'PY'
      from pathlib import Path

      manifest = Path("Cargo.toml")
      text = manifest.read_text()
      before = 'nemo-fabric-core = { path = "crates/fabric-core", version = '
      after = 'nemo-fabric-core = { path = "crates/fabric-core", registry = "artifactory", version = '
      if after not in text:
          if before not in text:
              raise SystemExit("Failed to find the nemo-fabric-core workspace dependency")
          text = text.replace(before, after)
      manifest.write_text(text)
      PY

      cargo publish --package nemo-fabric-core --registry artifactory --allow-dirty
      cargo publish --package nemo-fabric-cli --registry artifactory --allow-dirty
