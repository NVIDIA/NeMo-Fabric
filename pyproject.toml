[build-system]
requires = [
  "setuptools>=64",
  "setuptools-scm>=8",
  "setuptools_dynamic_dependencies>=1.0.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "nemo-fabric"
description = "Python SDK distribution for NeMo Fabric"
requires-python = ">=3.11"
dynamic = ["version", "dependencies", "optional-dependencies"]

[tool.setuptools]
packages = []

[tool.setuptools_dynamic_dependencies]
dependencies = [
]

[tool.setuptools_dynamic_dependencies.optional-dependencies]
adapters-common = [
  "nemo-fabric-adapters-common == {version}",
]

adapters-codex-cli = [
  "nemo-fabric-adapters-codex-cli == {version}",
]

adapters-hermes-cli = [
  "nemo-fabric-adapters-hermes-cli == {version}",
]

adapters-hermes-sdk = [
  "nemo-fabric-adapters-hermes-sdk == {version}",
]

codex = [
  "nemo-fabric-adapters-codex-cli == {version}",
]

harbor = [
  "harbor>=0.16.1; python_version >= '3.12'",
  "pyyaml>=6.0",
]

hermes = [
  "nemo-fabric-adapters-hermes-cli == {version}",
  "nemo-fabric-adapters-hermes-sdk == {version}",
  "hermes-agent>=0.17.0",
]

relay = [
  "nemo-relay~=0.4",
  "tomli-w~=1.2", # Needed by adapters to write relay config files
]

runtime = [
  "nemo-fabric-runtime == {version}",
]

[dependency-groups]
adapters = [
  "nemo-fabric-adapters-common",
  "nemo-fabric-adapters-codex-cli",
  "nemo-fabric-adapters-hermes-cli",
  "nemo-fabric-adapters-hermes-sdk",
]

dev = [
    "ipython~=8.20",
]

docs = [
  "lazydocs>=0.4",
  "beautifulsoup4>=4.12",
]

test = [
    "fastapi~=0.138",
    "pytest>=8",
    "pytest-asyncio>=0.26",
    "pytest-cov~=7.0",
    "pyyaml>=6.0",
    "tomli-w~=1.2",
    "uvicorn~=0.49",
]

[tool.uv]
default-groups = ["adapters", "dev", "test"]

[tool.uv.sources]
nemo-fabric-runtime = { path = "python" }
nemo-fabric-adapters-common = { path = "adapters/common" }
nemo-fabric-adapters-codex-cli = { path = "adapters/codex-cli" }
nemo-fabric-adapters-hermes-cli = { path = "adapters/hermes-cli" }
nemo-fabric-adapters-hermes-sdk = { path = "adapters/hermes-sdk" }

[tool.setuptools_scm]
git_describe_command = "git describe --long --first-parent"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
