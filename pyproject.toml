[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "nemo-fabric"
version = "0.1.0"
description = "Python SDK and native bindings for NeMo Fabric"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
adapters-common = [
  "nemo-fabric-adapters-common",
]

adapters-codex-cli = [
  "nemo-fabric-adapters-codex-cli",
]

adapters-hermes-cli = [
  "nemo-fabric-adapters-hermes-cli",
]

adapters-hermes-sdk = [
  "nemo-fabric-adapters-hermes-sdk",
]

codex = [
  "nemo-fabric-adapters-codex-cli",
]

harbor = [
  "harbor>=0.16.1; python_version >= '3.12'",
  "pyyaml>=6.0",
]
docs = [
  "lazydocs>=0.4",
  "beautifulsoup4>=4.12",
]

hermes = [
  "nemo-fabric-adapters-hermes-cli",
  "nemo-fabric-adapters-hermes-sdk",
  "hermes-agent>=0.17.0",
]

relay = [
  "nemo-relay~=0.4",
  "tomli-w~=1.2", # Needed by adapters to write relay config files
]

[dependency-groups]
dev = [
    "ipython~=8.20",
]

test = [
    "fastapi~=0.138",
    "pytest>=8",
    "pytest-asyncio>=0.26",
    "pytest-cov~=7.0",
    "pyyaml>=6.0",
    "tomli-w~=1.2",
    "uvicorn~=0.49",
]

[tool.uv]
default-groups = ["dev", "test"]

[tool.uv.sources]
nemo-fabric-adapters-common = { path = "adapters/common" }
nemo-fabric-adapters-codex-cli = { path = "adapters/codex-cli" }
nemo-fabric-adapters-hermes-cli = { path = "adapters/hermes-cli" }
nemo-fabric-adapters-hermes-sdk = { path = "adapters/hermes-sdk" }

[tool.maturin]
manifest-path = "crates/fabric-python/Cargo.toml"
python-source = "python/src"
module-name = "nemo_fabric._native"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
