[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "nemo-fabric"
version = "0.1.0"
description = "Python SDK and native bindings for NeMo Fabric"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.10,<3",
  "typing-extensions>=4.12",
]

[project.optional-dependencies]
codex = [
  "tomli>=2; python_version < '3.11'",
  "tomli-w~=1.2",
]

harbor = [
  "harbor>=0.16.1; python_version >= '3.12'",
  "pyyaml>=6.0",
]
docs = [
  "lazydocs>=0.4",
  "beautifulsoup4>=4.12",
]

hermes = [
  "hermes-agent>=0.17.0; python_version >= '3.11' and python_version < '3.14'",
  "pyyaml>=6.0", # needed by adapters to write hermes config files
]

relay = [
  "nemo-relay~=0.4; python_version >= '3.11'",
  "tomli-w~=1.2", # Needed by adapters to write relay config files
]

[dependency-groups]
dev = [
    "ipython~=8.20",
]

test = [
    "fastapi~=0.138",
    "pytest>=8",
    "pytest-asyncio>=0.26",
    "pytest-cov~=7.0",
    "pyyaml>=6.0",
    "tomli>=2; python_version < '3.11'",
    "tomli-w~=1.2",
    "uvicorn~=0.49",
]

[tool.uv]
default-groups = ["dev", "test"]

[tool.maturin]
manifest-path = "crates/fabric-python/Cargo.toml"
python-source = "python/src"
module-name = "nemo_fabric._native"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
