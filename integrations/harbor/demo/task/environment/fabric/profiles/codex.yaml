schema_version: fabric.profile/v1alpha1
name: codex
description: Run Codex CLI against the Harbor task workspace.

harness:
  adapter_id: nvidia.fabric.codex.cli
  resolution: preinstalled
  settings:
    cwd: /app
    sandbox: danger-full-access
    skip_git_repo_check: true
    config_overrides:
      model_reasoning_effort: high

runtime:
  mode: oneshot
  transport: cli
  artifacts: /logs/agent/fabric-artifacts/codex

environment:
  workspace: /app
  artifacts: /logs/agent/fabric-artifacts/codex

telemetry:
  enabled: false
